<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>سفارش ثبت شد | کافه دنج</title>
    <style>
        @import url('https://v1.fontapi.ir/css/Vazir');
        body {
            font-family: 'Vazir', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)),
                        url('https://images.unsplash.com/photo-1559496417-e7f25cb247f3?q=80&w=1964&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-white text-center">
    <div class="max-w-md w-full bg-white/5 backdrop-blur-2xl border border-white/10 p-10 rounded-[3rem] shadow-2xl">
        <div class="w-24 h-24 bg-green-500/20 text-green-500 rounded-full flex items-center justify-center mx-auto mb-8 border border-green-500/30">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <h1 class="text-3xl font-black mb-4">نوش جان! سفارش ثبت شد</h1>
        <p class="text-gray-400 mb-8 leading-relaxed">
            سفارش شما با موفقیت برای آشپزخانه ارسال شد. میز شماره <span class="text-amber-500 font-bold">{{ order.table.number }}</span> به زودی پذیرای شماست.
        </p>

        <div class="bg-black/20 rounded-2xl p-4 mb-8 border border-white/5">
            <div class="flex justify-between text-sm mb-2">
                <span class="text-gray-500">شماره سفارش:</span>
                <span class="font-mono">#{{ order.id }}</span>
            </div>
            <div class="flex justify-between text-sm">
                <span class="text-gray-500">مبلغ نهایی:</span>
                <span class="text-amber-500 font-bold">{{ order.total_price }} تومان</span>
            </div>
        </div>

        <a href="{% url 'menu:menu_list' %}" class="inline-block w-full py-4 bg-amber-600 hover:bg-amber-500 rounded-2xl font-bold transition-all transform hover:scale-105">
            بازگشت به منو
        </a>
    </div>
</body>
</html>
