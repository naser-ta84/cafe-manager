<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>تأیید کد ورود | کافه دنج</title>
    <style>
        @import url('https://v1.fontapi.ir/css/Vazir');
        body {
            font-family: 'Vazir', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
                        url('https://images.unsplash.com/photo-1501339817302-ee4f89ac82c3?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">
    <div class="bg-black/40 backdrop-blur-lg p-8 rounded-3xl border border-white/10 shadow-2xl w-full max-w-md transform transition-all">

        <div class="text-center mb-8">
            <div class="inline-block p-3 rounded-full bg-amber-500/20 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-white mb-2">تأیید حساب</h1>
            <p class="text-gray-400 text-sm">کد ۶ رقمی به شماره <span class="text-amber-400 font-bold">{{ request.session.user_phone }}</span> ارسال شد.</p>
        </div>

        {% if error %}
        <div class="bg-red-500/10 border border-red-500/50 text-red-500 text-sm p-3 rounded-xl mb-6 text-center">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div class="flex justify-center" dir="ltr">
                <input type="text" name="otp_code" maxlength="6" autofocus required
                    placeholder="------"
                    class="w-full text-center text-3xl tracking-[0.5em] font-black py-4 rounded-2xl bg-white/5 border border-white/10 text-amber-500 focus:border-amber-500 focus:ring-2 focus:ring-amber-500/20 focus:outline-none transition-all duration-300">
            </div>

            <button type="submit"
                class="w-full py-4 bg-amber-600 hover:bg-amber-500 text-white font-bold rounded-2xl shadow-lg shadow-amber-900/20 transition duration-300 transform hover:scale-[1.01] active:scale-95">
                تأیید و ورود به کافه
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-white/5 text-center">
            <a href="{% url 'accounts:login' %}" class="text-sm text-gray-400 hover:text-white transition group">
                <span class="inline-block transform group-hover:-translate-x-1 transition-transform ml-1">←</span>
                ویرایش شماره موبایل
            </a>
        </div>
    </div>
</body>
</html>
