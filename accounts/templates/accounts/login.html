<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ورود به کافه | Cafe Management</title>
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                        url('https://images.unsplash.com/photo-1501339817302-ee4f89ac82c3?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center font-sans">
    <div class="bg-white/10 backdrop-blur-md p-8 rounded-2xl border border-white/20 shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-amber-500 mb-2">کافه دنج</h1>
            <p class="text-gray-300">خوش آمدید! لطفا شماره موبایل خود را وارد کنید</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-gray-200 mb-2 mr-1">شماره موبایل</label>
                <input type="text" name="phone_number" placeholder="09123456789"
                    class="w-full px-4 py-3 rounded-xl bg-gray-800/50 border border-gray-600 text-white focus:border-amber-500 focus:outline-none transition">
            </div>

            <button type="submit"
                class="w-full py-3 bg-amber-600 hover:bg-amber-500 text-white font-bold rounded-xl shadow-lg transition duration-300 transform hover:scale-[1.02]">
                ارسال کد تایید
            </button>
        </form>

        <div class="mt-8 text-center text-gray-400 text-sm">
            با ورود، شرایط و قوانین کافه را می‌پذیرم.
        </div>
    </div>
</body>
</html>
