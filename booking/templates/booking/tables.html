<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>انتخاب میز | کافه دنج</title>
    <style>
        @import url('https://v1.fontapi.ir/css/Vazir');
        body {
            font-family: 'Vazir', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)),
                        url('https://images.unsplash.com/photo-1554118811-1e0d58224f24?q=80&w=2047&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="min-h-screen text-white p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-16">
            <h1 class="text-5xl font-black text-amber-500 mb-4 drop-shadow-lg">رزرو میز</h1>
            <p class="text-gray-300 text-lg">لطفاً میز مورد نظر خود را برای شروع سفارش انتخاب کنید</p>
            <div class="w-24 h-1 bg-amber-600 mx-auto mt-4 rounded-full"></div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            {% for table in tables %}
            <div class="group relative bg-white/5 backdrop-blur-xl border border-white/10 rounded-[2rem] p-8 hover:bg-white/10 hover:border-amber-500/50 transition-all duration-500 shadow-2xl">

                <div class="flex justify-between items-start mb-6">
                    <div class="p-4 bg-amber-500/20 rounded-2xl group-hover:scale-110 transition-transform duration-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
                        </svg>
                    </div>
                    <span class="bg-green-500/20 text-green-400 text-xs px-4 py-1.5 rounded-full border border-green-500/30 backdrop-blur-md">
                        موجود
                    </span>
                </div>

                <div class="space-y-2">
                    <h3 class="text-2xl font-bold text-white">میز شماره {{ table.number }}</h3>
                    <div class="flex items-center text-gray-400 space-x-2 space-x-reverse">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-amber-600" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z" />
                        </svg>
                        <span>ظرفیت: {{ table.capacity }} نفر</span>
                    </div>
                </div>

                <div class="mt-8">
                    <form method="POST" action="{% url 'booking:reserve_table' table.id %}">
                        {% csrf_token %}
                        <button type="submit"
                            class="w-full py-4 bg-amber-600 hover:bg-amber-500 text-white font-bold rounded-2xl transition-all duration-300 shadow-lg shadow-amber-900/40 hover:shadow-amber-600/20 transform hover:-translate-y-1 active:scale-95">
                            رزرو و مشاهده منو
                        </button>
                    </form>
                </div>
            </div>
            {% empty %}
            <div class="col-span-full text-center py-20 bg-white/5 rounded-[2rem] border border-dashed border-white/20">
                <p class="text-gray-400 text-xl">در حال حاضر میزی برای رزرو موجود نیست.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
